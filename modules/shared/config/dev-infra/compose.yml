name: dev-infra

services:
  portainer:
    image: portainer/portainer-ce:sts
    container_name: portainer
    command:
      - --admin-password
      - '$$2y$$10$$jrhGT44cae3CwxwtOEY5reSLUCj/bZ.c3dFrjXDr.CwsZtSvq1Cmi'
      # The above hash corresponds to the password "adminadmin!!"
    restart: unless-stopped
    ports:
      - "8000:8000"
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data

  mysql:
    build:
      context: .
      dockerfile: ./mysql/Dockerfile
    image: local-mysql-dev:8.4
    container_name: local-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_HOST: "%"
      MYSQL_ROOT_PASSWORD: adminadmin!!
      MYSQL_DATABASE: playground
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  postgres:
    image: postgres:16
    container_name: local-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: playground
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminadmin!!
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: local-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: local-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: adminadmin!!
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data

volumes:
  portainer_data:
  mysql_data:
  postgres_data:
  redis_data:
  minio_data:
