name: dev-infra

services:
  portainer:
    image: portainer/portainer-ce:sts
    container_name: portainer
    command:
      - --admin-password
      - '$$2y$$10$$jrhGT44cae3CwxwtOEY5reSLUCj/bZ.c3dFrjXDr.CwsZtSvq1Cmi'
      # The above hash corresponds to the password "adminadmin!!"
    restart: unless-stopped
    ports:
      - "${DEV_INFRA_BIND_ADDRESS:-0.0.0.0}:8000:8000"
      - "${DEV_INFRA_BIND_ADDRESS:-0.0.0.0}:9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data

  mysql:
    build:
      context: .
      dockerfile: ./mysql/Dockerfile
    image: local-mysql-dev:8.4
    container_name: local-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_HOST: "%"
      MYSQL_ROOT_PASSWORD: adminadmin!!
      MYSQL_DATABASE: playground
    ports:
      - "${DEV_INFRA_BIND_ADDRESS:-0.0.0.0}:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  postgres:
    image: postgres:16
    container_name: local-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: playground
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminadmin!!
    ports:
      - "${DEV_INFRA_BIND_ADDRESS:-0.0.0.0}:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: local-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "${DEV_INFRA_BIND_ADDRESS:-0.0.0.0}:6379:6379"
    volumes:
      - redis_data:/data

  rustfs:
    image: rustfs/rustfs:latest
    container_name: local-rustfs
    restart: unless-stopped
    environment:
      RUSTFS_ADDRESS: 0.0.0.0:9000
      RUSTFS_CONSOLE_ADDRESS: 0.0.0.0:9001
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_CORS_ALLOWED_ORIGINS: ${RUSTFS_CORS_ALLOWED_ORIGINS:-http://localhost:9000,http://localhost:9001,http://127.0.0.1:9000,http://127.0.0.1:9001,http://kimbank.local:9000,http://kimbank.local:9001,http://ehkim.local:9000,http://ehkim.local:9001}
      RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS: ${RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS:-http://localhost:9000,http://localhost:9001,http://127.0.0.1:9000,http://127.0.0.1:9001,http://kimbank.local:9000,http://kimbank.local:9001,http://ehkim.local:9000,http://ehkim.local:9001}
      RUSTFS_VOLUMES: /data
      RUSTFS_ACCESS_KEY: admin
      RUSTFS_SECRET_KEY: adminadmin!!
    ports:
      - "${DEV_INFRA_BIND_ADDRESS:-0.0.0.0}:9000:9000"
      - "${DEV_INFRA_BIND_ADDRESS:-0.0.0.0}:9001:9001"
    volumes:
      - rustfs_data:/data
    healthcheck:
      test:
        - CMD-SHELL
        - >
          curl -fsS http://127.0.0.1:9000/health &&
          (curl -fsS http://127.0.0.1:9001/health ||
          curl -fsS http://127.0.0.1:9001/rustfs/console/health)
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

volumes:
  portainer_data:
  mysql_data:
  postgres_data:
  redis_data:
  rustfs_data:
