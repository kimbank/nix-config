# Global Worktrunk defaults managed by Home Manager.
# Keep this file user-specific and broadly safe across repositories.

[post-create]
env = """
  if [ ! -e .env ]; then
    {% set primary = primary_worktree_path | default('') %}
    {% if primary and primary != worktree_path %}
    if [ -f {{ primary }}/.env ]; then
      cp {{ primary }}/.env .env
    elif [ -f {{ repo_path }}/.env ]; then
      cp {{ repo_path }}/.env .env
    fi
    {% else %}
    if [ -f {{ repo_path }}/.env ]; then
      cp {{ repo_path }}/.env .env
    fi
    {% endif %}
  fi
"""

pnpm = """
  if [ -f package.json ]; then
    if [ ! -f pnpm-lock.yaml ] && { [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ] || [ -f yarn.lock ]; }; then
      pnpm import
    fi

    pnpm install
  fi
"""

prisma = """
  if [ -f package.json ] && [ -f prisma/schema.prisma ]; then
    npx prisma generate
  fi
"""
