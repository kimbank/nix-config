# Global Worktrunk defaults managed by Home Manager.
# Keep this file user-specific and broadly safe across repositories.

[post-create]
env = """
  {% if base_worktree_path %}
  if [ ! -e .env ] && [ -f {{ base_worktree_path }}/.env ]; then
    cp {{ base_worktree_path }}/.env .env
  fi
  {% elif base %}
  {% set source_worktree = worktree_path_of_branch(base) %}
  {% if source_worktree %}
  if [ ! -e .env ] && [ -f {{ source_worktree }}/.env ]; then
    cp {{ source_worktree }}/.env .env
  fi
  {% endif %}
  {% endif %}
"""

pnpm = """
  if [ -f package.json ]; then
    if [ ! -f pnpm-lock.yaml ] && { [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ] || [ -f yarn.lock ]; }; then
      pnpm import
    fi

    pnpm install
  fi
"""

prisma = """
  if [ -f package.json ] && [ -f prisma/schema.prisma ]; then
    npx prisma generate
  fi
"""
